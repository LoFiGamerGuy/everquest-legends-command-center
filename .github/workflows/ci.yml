name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
  guard-no-raw-logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block raw logs and data dir
        run: |
          ! git ls-files | grep -E '^data/|(^|/)eqlog_.*\.txt$' || { echo 'Raw logs or data/ content committed'; exit 1; }
